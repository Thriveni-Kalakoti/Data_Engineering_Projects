name: Data Engineering CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-projects:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CSV to SQLite ETL dependencies
        working-directory: csv_to_sqlite_etl
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile CSV to SQLite ETL Python files
        working-directory: csv_to_sqlite_etl
        run: |
          python -m compileall src
