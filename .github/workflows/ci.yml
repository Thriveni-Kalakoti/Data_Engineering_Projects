name: Data Engineering CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  validate-projects:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CSV to SQLite ETL dependencies
        working-directory: csv_to_sqlite_etl
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile CSV to SQLite ETL Python files
        working-directory: csv_to_sqlite_etl
        run: |
          python -m compileall src

      - name: Run CSV to SQLite ETL tests
        working-directory: csv_to_sqlite_etl
        run: |
          pytest tests

      - name: Install API to DB Pipeline dependencies
        working-directory: api_to_db_pipeline
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile API to DB Pipeline Python files
        working-directory: api_to_db_pipeline
        run: |
          python -m compileall src

      - name: Run API to DB Pipeline tests
        working-directory: api_to_db_pipeline
        run: |
          pytest tests

      - name: Install PostgreSQL SQL Validation dependencies
        working-directory: postgres_sql_validation
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile PostgreSQL SQL Validation Python files
        working-directory: postgres_sql_validation
        run: |
          python -m compileall src

      - name: Run PostgreSQL SQL Validation tests
        working-directory: postgres_sql_validation
        run: |
          pytest tests

      - name: Install Dockerized Data Pipeline dependencies
        working-directory: dockerized_data_pipeline
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Dockerized Data Pipeline Python files
        working-directory: dockerized_data_pipeline
        run: |
          python -m compileall src

      - name: Run Dockerized Data Pipeline tests
        working-directory: dockerized_data_pipeline
        run: |
          pytest tests

      - name: Build Dockerized Data Pipeline image
        working-directory: dockerized_data_pipeline
        run: |
          docker build -t dockerized-data-pipeline .

      - name: Run Dockerized Data Pipeline container
        working-directory: dockerized_data_pipeline
        run: |
          docker run --rm dockerized-data-pipeline

      - name: Install Airflow ETL Pipeline dependencies
        working-directory: airflow_etl_pipeline
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Airflow ETL Pipeline Python files
        working-directory: airflow_etl_pipeline
        run: |
          python -m compileall src dags

      - name: Run Airflow ETL Pipeline tests
        working-directory: airflow_etl_pipeline
        run: |
          pytest tests

      - name: Install Cloud Data Warehouse Pipeline dependencies
        working-directory: cloud_data_warehouse_pipeline
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Cloud Data Warehouse Pipeline Python files
        working-directory: cloud_data_warehouse_pipeline
        run: |
          python -m compileall src

      - name: Run Cloud Data Warehouse Pipeline tests
        working-directory: cloud_data_warehouse_pipeline
        run: |
          pytest tests
